<div class="popup-overlay" *ngIf="visible">
  <div class="popup-box">
    <h4>Adatvédelmi tájékoztató</h4>
    <p>
      Az oldal használatával elfogadod az adatvédelmi tájékoztatónkat.
      Személyes adataidat kizárólag a szolgáltatás nyújtásához használjuk fel.
    </p>
    <button class="btn btn-success w-100" (click)="elfogad()">
      Elfogadom
    </button>
  </div>
</div>
